apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    namespace "uz.ajdo.shajara"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "uz.ajdo.shajara"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 16
        versionName "1.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // MUHIM (sabab): standart AGP debug imzosi (`~/.android/debug.keystore`)
    // mavjud bo'lmasa AVTOMATIK, TASODIFIY sertifikat bilan yaratiladi.
    // GitHub Actions runner'lari HAR SAFAR yangi (hech narsa saqlanmaydi)
    // bo'lgani uchun bu HAR CI build'da BOSHQA-BOSHQA imzo degani edi —
    // Android esa boshqa imzo bilan APK'ni "yangilash" sifatida o'RNATISHNI
    // RAD ETADI (avval eskisini qo'lda o'chirish talab qilinadi, aks holda
    // "App not installed"/hech narsa sodir bo'lmagandek ko'rinadi). Aynan shu
    // — foydalanuvchi "yangi APK yuklab olsam ham eski qoladi" deb xabar
    // bergan muammoning haqiqiy ildizi edi. Yechim: BIR MARTA yaratilgan,
    // repo'ga saqlangan barqaror keystore (debug kalitlar maxfiy emas —
    // standart amaliyot) — endi HAR bir build BIR XIL imzo bilan chiqadi.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // capacitor.build.gradle (pastda apply qilinadi) sourceCompatibility'ni
    // VERSION_21 qilib qo'yadi — Kotlin ham shu bilan mos bo'lishi kerak.
    kotlinOptions {
        jvmTarget = "21"
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.android.billingclient:billing:7.1.1"
    // AjdoFirebaseMessagingService (MessagingService.java) uchun — capacitor-push-notifications
    // buni faqat 'implementation' sifatida oladi, shuning uchun tranzitiv tarzda ochilmaydi.
    implementation "com.google.firebase:firebase-messaging:$firebaseMessagingVersion"
    // Krashlarni Firebase Console'da masofadan ko'rish uchun — S21+/A32'dagi
    // qo'ng'iroq krashini adb/logcat'siz (foydalanuvchi qurilmasiga fizik
    // kirishsiz) tashxislash uchun SHART bo'lib qoldi.
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-analytics'
    // Native (Kotlin) qo'ng'iroq ekrani — calls/CallActivity.kt va h.k.
    // (WebView/livekit-client EMAS — qulf ekranida jiringlash va ekran
    // ulashishni boshlash uchun butunlay mustaqil native ekran shart).
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "io.livekit:livekit-android:2.18.2"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.7"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1"
    implementation "androidx.activity:activity-ktx:$androidxActivityVersion"
    // AuthTokenBridge — JS'dagi access-tokenni native xavfsiz saqlashga
    // (shifrlangan) sinxronlash uchun.
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
        apply plugin: 'com.google.firebase.crashlytics'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
