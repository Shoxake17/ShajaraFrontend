name: CI/CD Pipeline - Shajara Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Gitleaks - Kod ichidagi maxfiy kalitlarni tekshirish
  gitleaks_scan:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build va Push (Trivy bilan xavfsizlik tekshiruvi)
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/shoxake17/shajara-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/shoxake17/shajara-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          
      - name: Push to GHCR
        run: |
          docker tag ghcr.io/shoxake17/shajara-frontend:latest ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}
          docker push ghcr.io/shoxake17/shajara-frontend:latest
          docker push ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}

  # 3. Deploy
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/shajara

            # Frontend tagini yangilash
            sed -i '/^FRONTEND_TAG=/d' .env
            echo "FRONTEND_TAG=${{ github.sha }}" >> .env

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            docker-compose pull frontend
            docker-compose up -d --no-deps --force-recreate frontend
            docker image prune -f

  # 4. Android APK'ni avtomatik qurish va e'lon qilish — bu job ATAYLAB
  # MUSTAQIL (build-and-push/deploy'ga bog'liq EMAS, ular ham bunga
  # bog'liq emas): agar APK qurilishida xato chiqsa, bu asosiy veb
  # deploy'ni HECH QACHON to'xtatmaydi/bloklamaydi.
  #
  # Natija public/downloads/AJDO.apk + latest.json'ga yoziladi va SHU
  # REPO'ga qayta commit qilinadi (github-actions[bot] nomidan) — shunda
  # ODDIY frontend Docker build (Dockerfile'dagi `npm run build`, public/
  # papkasini avtomatik dist/'ga ko'chiradi) o'zgarishsiz qolib, keyingi
  # HAR QANDAY push'da eng so'nggi APK'ni nginx orqali xizmat qiladi —
  # alohida SSH/server sozlamasi yoki yangi maxfiy kalit SHART emas.
  #
  # ESLATMA: GITHUB_TOKEN bilan qilingan push standart bo'yicha workflow'ni
  # QAYTA ishga tushirmaydi (cheksiz tsikl xavfi yo'q) — shu bois yangi
  # APK ODDIY navbatdagi (keyingi) push'da e'lon qilinadi (bitta push
  # "kechikish" — asosiy deploy pipeline'ga bog'liqlikni oldini olish
  # uchun ongli tanlov).
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Node o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK 21 o'rnatish (Capacitor Android buni talab qiladi)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # MUHIM: ubuntu-latest runner'da Android SDK O'RNATILGAN bo'lsa ham,
      # `sdkmanager` PATH'da YO'Q (avvalgi urinishda "command not found",
      # exit 127 bilan tasdiqlandi) — shu bois SDK'ni to'g'ri
      # sozlaydigan/PATH'ga qo'shadigan RASMIY action ishlatiladi (o'zi
      # sdkmanager'ni topib, cmdline-tools'ni o'rnatib beradi).
      - name: Android SDK'ni sozlash
        uses: android-actions/setup-android@v3

      - name: Android SDK platformasi/build-tools (android/variables.gradle bilan mos)
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Bog'liqliklarni o'rnatish
        run: npm ci

      - name: Veb bundle'ni qurish (nativ rejim)
        run: npm run build:capacitor

      - name: Capacitor'ni Android bilan sinxronlash
        run: npx cap sync android

      - name: APK'ni yig'ish (debug — release imzosi hali sozlanmagan)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Yuklab olish papkasi/manifestini tayyorlash
        run: |
          mkdir -p public/downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk public/downloads/AJDO.apk
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          printf '{"versionCode": %s, "versionName": "%s"}\n' "$VERSION_CODE" "$VERSION_NAME" > public/downloads/latest.json

      - name: Yangi APK'ni repo'ga commit qilish
        run: |
          # MUHIM: AJDO.apk Git LFS orqali kuzatiladi (.gitattributes) —
          # GitHub'ning ODDIY git obyekti uchun 100 MB qattiq chegarasi bor
          # ("File ... exceeds GitHub's file size limit" xatosi shu
          # sababdan chiqqan edi, APK 100+ MB'ga yetganda). `git lfs
          # install` runner'ning O'ZIDA (checkout keyin) filtrni faollashtiradi
          # — aks holda `git add` APK'ni LFS'siz, ODDIY (katta) obyekt
          # sifatida qo'shib qo'yishi mumkin edi.
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/downloads/AJDO.apk public/downloads/latest.json
          git diff --cached --quiet && echo "O'zgarish yo'q" || git commit -m "chore: AJDO.apk avtomatik yangilash"
          git push