name: CI/CD Pipeline - Shajara Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Gitleaks - Kod ichidagi maxfiy kalitlarni tekshirish
  gitleaks_scan:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build va Push (Trivy bilan xavfsizlik tekshiruvi)
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/shoxake17/shajara-frontend:latest
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/shoxake17/shajara-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          
      - name: Push to GHCR
        run: |
          docker tag ghcr.io/shoxake17/shajara-frontend:latest ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}
          docker push ghcr.io/shoxake17/shajara-frontend:latest
          docker push ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}

  # 3. Deploy
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/shajara
            
            # Frontend tagini yangilash
            sed -i '/^FRONTEND_TAG=/d' .env
            echo "FRONTEND_TAG=${{ github.sha }}" >> .env
            
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            docker-compose pull frontend
            docker-compose up -d --no-deps --force-recreate frontend
            docker image prune -f