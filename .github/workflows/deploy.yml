name: CI/CD Pipeline - Shajara Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Gitleaks - Kod ichidagi maxfiy kalitlarni tekshirish
  gitleaks_scan:
    name: Secrets - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Build va Push (Trivy bilan xavfsizlik tekshiruvi)
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: gitleaks_scan
    steps:
      # MUHIM: `lfs: true` SHART — aks holda AJDO.apk/AJDO.exe kabi
      # Git LFS orqali kuzatiladigan fayllar checkout paytida HAQIQIY
      # tarkib EMAS, faqat kichik "pointer" matni (~130 bayt) sifatida
      # qoladi. Aynan shu sabab bilan AJDO.exe production'da 134
      # baytli (buzilgan) fayl sifatida xizmat qilib qolgan edi —
      # foydalanuvchi "ilova hajmi 1KB" deb xabar bergan edi.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/shoxake17/shajara-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/shoxake17/shajara-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          
      - name: Push to GHCR
        run: |
          docker tag ghcr.io/shoxake17/shajara-frontend:latest ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}
          docker push ghcr.io/shoxake17/shajara-frontend:latest
          docker push ghcr.io/shoxake17/shajara-frontend:${{ github.sha }}

  # 3. Deploy
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/shajara

            # Frontend tagini yangilash
            sed -i '/^FRONTEND_TAG=/d' .env
            echo "FRONTEND_TAG=${{ github.sha }}" >> .env

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            docker-compose pull frontend
            docker-compose up -d --no-deps --force-recreate frontend
            docker image prune -f

  # 4. Android APK'ni avtomatik qurish va e'lon qilish — bu job ATAYLAB
  # MUSTAQIL (build-and-push/deploy'ga bog'liq EMAS, ular ham bunga
  # bog'liq emas): agar APK qurilishida xato chiqsa, bu asosiy veb
  # deploy'ni HECH QACHON to'xtatmaydi/bloklamaydi.
  #
  # Natija downloads/AJDO.apk + latest.json'ga yoziladi va SHU
  # REPO'ga qayta commit qilinadi (github-actions[bot] nomidan) — shunda
  # ODDIY frontend Docker build (Dockerfile'dagi `npm run build`, public/
  # papkasini avtomatik dist/'ga ko'chiradi) o'zgarishsiz qolib, keyingi
  # HAR QANDAY push'da eng so'nggi APK'ni nginx orqali xizmat qiladi —
  # alohida SSH/server sozlamasi yoki yangi maxfiy kalit SHART emas.
  #
  # ESLATMA: GITHUB_TOKEN bilan qilingan push standart bo'yicha workflow'ni
  # QAYTA ishga tushirmaydi (cheksiz tsikl xavfi yo'q) — shu bois yangi
  # APK ODDIY navbatdagi (keyingi) push'da e'lon qilinadi (bitta push
  # "kechikish" — asosiy deploy pipeline'ga bog'liqlikni oldini olish
  # uchun ongli tanlov).
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Node o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK 21 o'rnatish (Capacitor Android buni talab qiladi)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # MUHIM: ubuntu-latest runner'da Android SDK O'RNATILGAN bo'lsa ham,
      # `sdkmanager` PATH'da YO'Q (avvalgi urinishda "command not found",
      # exit 127 bilan tasdiqlandi) — shu bois SDK'ni to'g'ri
      # sozlaydigan/PATH'ga qo'shadigan RASMIY action ishlatiladi (o'zi
      # sdkmanager'ni topib, cmdline-tools'ni o'rnatib beradi).
      - name: Android SDK'ni sozlash
        uses: android-actions/setup-android@v3

      - name: Android SDK platformasi/build-tools (android/variables.gradle bilan mos)
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Bog'liqliklarni o'rnatish
        run: npm ci

      - name: Veb bundle'ni qurish (nativ rejim)
        run: npm run build:capacitor

      - name: Capacitor'ni Android bilan sinxronlash
        run: npx cap sync android

      - name: APK'ni yig'ish (debug — release imzosi hali sozlanmagan)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Yuklab olish papkasi/manifestini tayyorlash
        run: |
          # MUHIM: public/ ICHIDA EMAS — aks holda cap sync android bu
          # fayllarni Android ilovaning O'ZINING ICHIGA nusxalab,
          # Gradle'ning compressDebugAssets bosqichini "Java heap space"
          # xatosi bilan yiqitardi (200+ MB keraksiz binary).
          mkdir -p downloads
          cp android/app/build/outputs/apk/debug/app-debug.apk downloads/AJDO.apk
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          printf '{"versionCode": %s, "versionName": "%s"}\n' "$VERSION_CODE" "$VERSION_NAME" > downloads/latest.json

      - name: Yangi APK'ni repo'ga commit qilish
        run: |
          # MUHIM: AJDO.apk Git LFS orqali kuzatiladi (.gitattributes) —
          # GitHub'ning ODDIY git obyekti uchun 100 MB qattiq chegarasi bor
          # ("File ... exceeds GitHub's file size limit" xatosi shu
          # sababdan chiqqan edi, APK 100+ MB'ga yetganda). `git lfs
          # install` runner'ning O'ZIDA (checkout keyin) filtrni faollashtiradi
          # — aks holda `git add` APK'ni LFS'siz, ODDIY (katta) obyekt
          # sifatida qo'shib qo'yishi mumkin edi.
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/AJDO.apk downloads/latest.json
          if git diff --cached --quiet; then
            echo "O'zgarish yo'q"
            exit 0
          fi
          git commit -m "chore: AJDO.apk avtomatik yangilash"
          # MUHIM: build-desktop job'i (windows-latest) HAM shu SHU push
          # hodisasidan kelib chiqib, PARALLEL ravishda main'ga o'z bot-
          # commit'ini push qilishi mumkin — kim birinchi push qilsa
          # o'shanikiga ega bo'ladi, ikkinchisi "fetch first" (non-fast-
          # forward) bilan RAD ETILARDI. Fayllar boshqa-boshqa bo'lgani
          # uchun (AJDO.apk vs desktop/AJDO.exe) rebase HECH QACHON
          # ziddiyatga tushmaydi — shu bois oddiy fetch+rebase+qayta urinish
          # yetarli.
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rad etildi (ehtimol parallel build-desktop bot-commit) — fetch+rebase bilan qayta urinilmoqda ($i)..."
            git fetch origin main
            # MUHIM: build bosqichlari (tsc va h.k.) tasodifan boshqa
            # KUZATILADIGAN faylni o'zgartirib qo'ygan bo'lsa, `git rebase`
            # "You have unstaged changes" bilan RAD ETARDI — commit
            # allaqachon o'z ichiga oladigan narsalarni saqlab qo'ygan,
            # shu bois qolgan har qanday kutilmagan o'zgarish xavfsiz
            # tashlab yuboriladi (working tree har doim toza CI runner'da).
            git checkout -- . 2>/dev/null || true
            git rebase origin/main
            sleep $((RANDOM % 5 + 2))
          done
          echo "Push barcha urinishlardan keyin ham muvaffaqiyatsiz bo'ldi" >&2
          exit 1

  # 6. Windows desktop (.exe) ilovasini avtomatik qurish va e'lon qilish —
  # build-apk bilan AYNAN bir xil mustaqil/xavfsiz naqsh: Android o'rniga
  # Electron/electron-builder, ubuntu-latest o'rniga windows-latest
  # (Windows nishonli .exe qurish uchun native muhit kerak). Bu job ham
  # asosiy veb deploy'dan MUSTAQIL — muvaffaqiyatsiz bo'lsa ham uni
  # to'xtatmaydi.
  build-desktop:
    name: Build Windows Desktop App
    runs-on: windows-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Node o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bog'liqliklarni o'rnatish (asosiy)
        run: npm ci

      - name: Bog'liqliklarni o'rnatish (electron)
        run: npm --prefix electron ci

      - name: Desktop ilovasini qurish (veb bundle --mode electron + electron-builder)
        run: npm run build:desktop

      - name: Yuklab olish papkasini tayyorlash
        run: |
          # MUHIM: public/ ICHIDA EMAS — Android job'idagi bilan bir xil
          # sabab (assets bloati/OOM oldini olish uchun).
          New-Item -ItemType Directory -Force -Path downloads/desktop | Out-Null
          Copy-Item electron/dist-electron/AJDO.exe downloads/desktop/AJDO.exe -Force
          Copy-Item electron/dist-electron/latest.yml downloads/desktop/latest.yml -Force
          if (Test-Path electron/dist-electron/AJDO.exe.blockmap) {
            Copy-Item electron/dist-electron/AJDO.exe.blockmap downloads/desktop/AJDO.exe.blockmap -Force
          }

      - name: Yangi .exe'ni repo'ga commit qilish
        run: |
          # AJDO.exe HAM Git LFS orqali (.gitattributes) — Electron
          # ilovalari Chromium+Node bundlagani uchun APK'dan ham kattaroq
          # (150+ MB) bo'lishi mumkin.
          git lfs install
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/desktop/
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Output "O'zgarish yo'q"
            exit 0
          }
          git commit -m "chore: AJDO.exe avtomatik yangilash"
          # MUHIM: build-apk job'i (ubuntu-latest) HAM shu SHU push
          # hodisasidan kelib chiqib, PARALLEL ravishda main'ga o'z bot-
          # commit'ini push qilishi mumkin — kim birinchi push qilsa
          # o'shanikiga ega bo'ladi, ikkinchisi "fetch first" (non-fast-
          # forward) bilan RAD ETILARDI. Fayllar boshqa-boshqa bo'lgani
          # uchun (desktop/AJDO.exe vs AJDO.apk) rebase HECH QACHON
          # ziddiyatga tushmaydi — shu bois oddiy fetch+rebase+qayta urinish
          # yetarli.
          $pushed = $false
          for ($i = 1; $i -le 5; $i++) {
            git push
            if ($LASTEXITCODE -eq 0) { $pushed = $true; break }
            Write-Output "Push rad etildi (ehtimol parallel build-apk bot-commit) — fetch+rebase bilan qayta urinilmoqda ($i)..."
            git fetch origin main
            # MUHIM: build bosqichlari tasodifan boshqa KUZATILADIGAN
            # faylni o'zgartirib qo'ygan bo'lsa, `git rebase` "You have
            # unstaged changes" bilan RAD ETARDI — commit allaqachon
            # kerakli narsalarni saqlab qo'ygan, shu bois qolgan har
            # qanday kutilmagan o'zgarish xavfsiz tashlab yuboriladi.
            git checkout -- .
            git rebase origin/main
            Start-Sleep -Seconds (Get-Random -Minimum 2 -Maximum 7)
          }
          if (-not $pushed) {
            Write-Error "Push barcha urinishlardan keyin ham muvaffaqiyatsiz bo'ldi"
            exit 1
          }