server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # CSP
    # connect-src: https://*.r2.cloudflarestorage.com — brauzer profil/media
    # rasmini TO'G'RIDAN-TO'G'RI Cloudflare R2'ning S3 API'siga (presigned
    # URL, backend oralab o'tmaydi) PUT qiladi; backend path-style manzil
    # ishlatadi (storage.service.ts: forcePathStyle) — shu bois wildcard
    # bitta bosh qatlam (accountId) bilan mos keladi.
    # img-src: https://media.ajdo.uz — R2_PUBLIC_URL (.env) shu CUSTOM
    # DOMEN'ga o'rnatilgan (Cloudflare R2 bucket -> Custom Domains). Bu
    # domen o'zgarsa (.env dagi R2_PUBLIC_URL bilan BIRGA) shu yerni ham
    # yangilang, aks holda yuklangan rasmlar ko'rinmay qoladi (faqat
    # yuklashning o'zi ishlab, ko'rsatish CSP tomonidan bloklanadi).
    # static.cloudflareinsights.com / cloudflareinsights.com — domen
    # Cloudflare orqali proksi qilingani uchun Cloudflare O'ZI avtomatik
    # in'ektsiya qiladigan beacon skripti (Web Analytics/Bot himoyasi);
    # biz qo'shmaganmiz, lekin CSP'siz brauzer uni bloklab, konsolда
    # xato chiqaradi. Xohlasangiz Cloudflare panelida (Analytics -> Web
    # Analytics) o'chirib, bu ikkovini CSP'dan olib tashlashingiz mumkin.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://media.ajdo.uz; connect-src 'self' https://accounts.google.com https://www.googleapis.com https://*.r2.cloudflarestorage.com https://cloudflareinsights.com; frame-src https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik fayllarni uzoq muddat keshlash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip optimallashtirish
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}