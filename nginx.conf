server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # CSP
    # connect-src: https://*.r2.cloudflarestorage.com — brauzer profil/media
    # rasmini TO'G'RIDAN-TO'G'RI Cloudflare R2'ning S3 API'siga (presigned
    # URL, backend oralab o'tmaydi) PUT qiladi; backend path-style manzil
    # ishlatadi (storage.service.ts: forcePathStyle) — shu bois wildcard
    # bitta bosh qatlam (accountId) bilan mos keladi.
    # img-src: https://*.r2.cloudflarestorage.com — a'zo/media rasmlari
    # ENDI PRIVATE (media.ajdo.uz kabi ochiq custom domen ORQALI EMAS):
    # backend har safar 6 soatlik PRESIGNED GET URL yaratadi
    # (storage.service.ts: createViewUrl), brauzer to'g'ridan-to'g'ri shu
    # R2 S3 API manzilidan (accountId.r2.cloudflarestorage.com/bucket/...)
    # yuklaydi — connect-src'dagi bilan BIR XIL wildcard shart, aks holda
    # rasm HAR SAFAR yuklanmay, konsolда CSP xatosi chiqadi. media.ajdo.uz
    # endi hech qanday rasm uchun ishlatilmaydi (o'chirib qo'yilgan).
    # img-src: blob: — PhotoPicker/SettingsPage rasm tanlangach server
    # javobini kutmay URL.createObjectURL() bilan DARHOL mahalliy oldindan
    # ko'rish (preview) ko'rsatadi; bu alohida sxema, data:/https: uni
    # QAMRAB OLMAYDI — bo'lmasa FAQAT production'da (CSP header shu yerdan
    # yuboriladi, dev serverida umuman yo'q) preview yuklanmay qoladi.
    # static.cloudflareinsights.com / cloudflareinsights.com — domen
    # Cloudflare orqali proksi qilingani uchun Cloudflare O'ZI avtomatik
    # in'ektsiya qiladigan beacon skripti (Web Analytics/Bot himoyasi);
    # biz qo'shmaganmiz, lekin CSP'siz brauzer uni bloklab, konsolда
    # xato chiqaradi. Xohlasangiz Cloudflare panelida (Analytics -> Web
    # Analytics) o'chirib, bu ikkovini CSP'dan olib tashlashingiz mumkin.
    # wss://livekit.ajdo.uz — LiveKit qo'ng'iroq signalizatsiyasi (WebRTC),
    # backend'dan olinadigan token bilan brauzer TO'G'RIDAN-TO'G'RI shu
    # subdomenga WebSocket ulanadi ('self' buni QAMRAB OLMAYDI, chunki
    # boshqa subdomen — aks holda "violates CSP directive: connect-src"
    # bilan ulanish darhol uzilib, qo'ng'iroq boshlanmasdan tugaydi).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.r2.cloudflarestorage.com; connect-src 'self' https://accounts.google.com https://www.googleapis.com https://*.r2.cloudflarestorage.com https://cloudflareinsights.com wss://livekit.ajdo.uz https://livekit.ajdo.uz; media-src 'self' blob:; frame-src https://accounts.google.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik fayllarni uzoq muddat keshlash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip optimallashtirish
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}